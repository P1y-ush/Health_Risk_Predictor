input {
  beats {
    port => 5044
  }
}

filter {
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "app"
    }
    date {
      match => ["[app][timestamp]", "ISO8601"]
      target => "@timestamp"
    }
    mutate {
      add_field => {
        "service_name" => "%{[app][service]}"
        "log_level" => "%{[app][level]}"
      }
    }
  }

  # Parse health prediction logs
  if [app][risk] {
    mutate {
      add_field => {
        "risk_level" => "%{[app][risk]}"
        "prediction_confidence" => "%{[app][confidence]}"
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "health-predictor-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}
