apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: health-app-hpa
  labels:
    app: health-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: health-app-green
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
