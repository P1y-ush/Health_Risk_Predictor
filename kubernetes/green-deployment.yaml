apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-app-green
  labels:
    app: health-app
    slot: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: health-app
      slot: green
  template:
    metadata:
      labels:
        app: health-app
        slot: green
    spec:
      containers:
      - name: health-app
        image: p1yush123/health-risk-predictor:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
